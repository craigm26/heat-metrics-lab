name: Deploy to Cloudflare Pages
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cloudflare credentials are configured
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Repo secret CLOUDFLARE_API_TOKEN is not set. Create a Cloudflare API token (template: 'Cloudflare Pages — Edit') and add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Repo secret CLOUDFLARE_ACCOUNT_ID is not set. Copy it from any page of the Cloudflare dashboard (right sidebar) and add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          exit $missing
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=heat-metrics-lab --branch=master
